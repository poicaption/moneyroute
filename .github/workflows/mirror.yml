name: Mirror to poicaption (triggers Vercel auto-deploy)

# ทุกครั้งที่ push ขึ้น main ของ repo นี้ (ฝั่ง facexercise)
# จะ mirror โค้ดไปยัง poicaption/moneyroute
# แล้ว Vercel ของ poicaption (ผูกแบบ native Git integration) จะ auto-deploy เอง
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # อย่าฝัง credential ของ github-actions[bot] ไว้กับ github.com
          # ไม่งั้นมันจะทับ MIRROR_TOKEN ใน URL แล้ว push ไป poicaption ไม่ได้
          persist-credentials: false

      - name: Push code (without workflows) to poicaption/moneyroute
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git config user.name "mirror-bot"
          git config user.email "mirror-bot@users.noreply.github.com"
          # poicaption เป็นแค่ปลายทาง deploy ไม่ต้องมีไฟล์ workflow
          # (เลี่ยงข้อจำกัด PAT ที่ต้องมี workflow scope)
          rm -rf .github
          git add -A
          git commit --allow-empty -m "Mirror ${GITHUB_SHA} from facexerciseclinic-cloud/moneyroute"
          git push --force \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/poicaption/moneyroute.git" \
            HEAD:main
